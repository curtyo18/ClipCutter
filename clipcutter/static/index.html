<!DOCTYPE html>
<html lang="en" data-dir="B">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClipCutter</title>
</head>
<body>

<div class="cc">
  <div class="cc-titlebar">
    <span class="cc-app">ClipCutter</span>
    <span class="cc-app-meta">localhost:8000</span>
    <span style="flex:1"></span>
    <span class="cc-app-meta cc-dim" id="headerRight"></span>
    <span class="cc-dot" id="statusDot"></span>
  </div>

  <div class="cc-tabs">
    <button class="cc-tab" data-active="true" data-tab="process" type="button">
      <span class="cc-tab-num">01</span> Process
    </button>
    <button class="cc-tab" data-tab="review" type="button">
      <span class="cc-tab-num">02</span> Review
    </button>
    <button class="cc-tab" data-tab="export" type="button">
      <span class="cc-tab-num">03</span> Export
    </button>
    <span class="cc-tab-spacer"></span>
    <span class="cc-task-chip" data-state="idle" id="taskChip">
      <span class="cc-dot"></span><span>idle</span>
    </span>
  </div>

  <div class="cc-body">
    <div id="overlay" class="overlay">
      <div id="overlayText" class="overlay-text"></div>
    </div>
    <div class="cc-toast-wrap" id="toastWrap"></div>

    <div class="main">
      <div class="view active" id="view-process">
        <div class="form-section">
          <h2>Process Videos</h2>
          <div class="form-row">
            <div class="form-group wide">
              <label>Video folder</label>
              <input type="text" id="folderPath" placeholder="C:\path\to\videos" />
            </div>
            <div class="form-group">
              <label>Sensitivity</label>
              <input type="number" id="sensitivity" value="1.0" min="0.1" max="5.0" step="0.1" />
            </div>
            <div class="form-group">
              <label>Context (s)</label>
              <input type="number" id="context" placeholder="20" min="0" step="1" />
            </div>
            <button class="btn-scan" id="btnScan" onclick="window._cc.scanFolderHandler()">Scan</button>
            <button class="btn-process" id="btnProcess" onclick="window._cc.startProcessingHandler()">Process</button>
          </div>
        </div>
        <div id="folderScanPanel" style="display:none">
          <div class="scan-panel" id="videosInFolderSection"></div>
          <div class="scan-panel" id="staleCandidatesSection" style="border-color:#2d1111"></div>
        </div>
        <div class="log-box" id="logBox"></div>
      </div>

      <div class="view" id="view-review">
        <div id="reviewContent">
          <div class="empty-state">No pending clips. Process some videos first.</div>
        </div>
      </div>

      <div class="view" id="view-export">
        <div id="exportContent">
          <div class="empty-state">Loading export data...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
