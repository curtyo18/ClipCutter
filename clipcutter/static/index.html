<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClipCutter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    min-height: 100vh;
  }

  /* ---- Header / Tabs ---- */
  .header {
    display: flex;
    align-items: center;
    padding: 0 24px;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    gap: 24px;
  }
  .header h1 { font-size: 18px; font-weight: 600; color: #fff; padding: 14px 0; }
  .tabs { display: flex; gap: 4px; }
  .tab {
    padding: 14px 18px;
    font-size: 14px;
    font-weight: 500;
    color: #888;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab:hover { color: #ccc; }
  .tab.active { color: #fff; border-bottom-color: #60a5fa; }
  .header-right { margin-left: auto; font-size: 13px; color: #666; }

  .main { max-width: 960px; margin: 0 auto; padding: 24px; }
  .view { display: none; }
  .view.active { display: block; }

  /* ---- Process view ---- */
  .form-section {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .form-section h2 { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 16px; }
  .form-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    align-items: end;
  }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.wide { flex: 1; }
  .form-group label { font-size: 12px; color: #888; font-weight: 500; }
  .form-group input[type="text"],
  .form-group input[type="number"] {
    padding: 10px 12px;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus { border-color: #60a5fa; }
  .form-group input[type="number"] { width: 100px; }

  .btn-process {
    padding: 10px 28px;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-process:hover { background: #1d4ed8; }
  .btn-process:disabled { background: #333; color: #666; cursor: not-allowed; }

  .log-box {
    background: #0a0a0a;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 16px;
    font-family: 'Consolas', 'SF Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    color: #aaa;
    max-height: 400px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .log-box .log-line { margin-bottom: 1px; }
  .log-box .log-done { color: #4ade80; font-weight: 600; }
  .log-box .log-error { color: #f87171; font-weight: 600; }
  .log-box:empty::after { content: 'Waiting to start...'; color: #444; }

  /* ---- Review view ---- */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: #666;
    font-size: 16px;
  }
  .player-section {
    background: #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  video {
    width: 100%;
    display: block;
    background: #000;
    max-height: 480px;
  }
  .clip-info { padding: 20px 24px; }
  .clip-title { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 8px; }
  .clip-meta {
    display: flex; gap: 20px; flex-wrap: wrap;
    font-size: 13px; color: #999; margin-bottom: 12px;
  }
  .clip-meta span { display: flex; align-items: center; gap: 4px; }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .tag {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 500;
  }
  .tag-volume_spike { background: #3b1f1f; color: #f87171; }
  .tag-laughter { background: #1f3b2a; color: #4ade80; }
  .tag-shouting { background: #3b2f1f; color: #fbbf24; }
  .tag-sudden_noise { background: #1f2a3b; color: #60a5fa; }
  .tag-fallback { background: #2a2a2a; color: #888; }
  .confidence-bar { height: 4px; background: #2a2a2a; border-radius: 2px; overflow: hidden; }
  .confidence-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

  .actions { display: flex; gap: 12px; padding: 0 24px 24px; }
  .btn {
    flex: 1; padding: 14px; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: transform 0.1s, opacity 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.97); }
  .btn .shortcut { font-size: 11px; font-weight: 400; opacity: 0.6; }
  .btn-keep { background: #166534; color: #fff; }
  .btn-skip { background: #333; color: #ccc; }
  .btn-discard { background: #7f1d1d; color: #fff; }

  /* ---- Trim controls ---- */
  .trim-section {
    padding: 0 24px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .trim-label { font-size: 12px; color: #888; font-weight: 500; }
  .trim-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .trim-time {
    font-family: 'Consolas', 'SF Mono', monospace;
    font-size: 14px;
    color: #fff;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 6px 10px;
    width: 70px;
    text-align: center;
    outline: none;
  }
  .trim-time:focus { border-color: #60a5fa; }
  .trim-btn {
    padding: 6px 10px;
    background: #2a2a2a;
    color: #aaa;
    border: 1px solid #333;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .trim-btn:hover { background: #333; color: #fff; }
  .trim-indicator {
    margin-left: auto;
    font-size: 12px;
    color: #666;
  }
  .trim-indicator.active { color: #fbbf24; }

  /* ---- Custom name input ---- */
  .name-section {
    padding: 0 24px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .clip-name-input {
    flex: 1;
    padding: 8px 12px;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 6px;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .clip-name-input:focus { border-color: #60a5fa; }
  .clip-name-input::placeholder { color: #555; }

  .progress { display: flex; gap: 4px; margin-bottom: 20px; height: 3px; }
  .progress-dot { flex: 1; border-radius: 2px; background: #2a2a2a; transition: background 0.3s; }
  .progress-dot.done { background: #166534; }
  .progress-dot.discarded { background: #7f1d1d; }
  .progress-dot.current { background: #60a5fa; }

  .done-state { text-align: center; padding: 40px 24px; }
  .done-state h2 { font-size: 24px; color: #fff; margin-bottom: 12px; }
  .done-state p { color: #888; font-size: 15px; margin-bottom: 4px; }

  .cleanup-section {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 24px;
    margin-top: 24px;
    text-align: left;
  }
  .cleanup-section h3 { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 16px; }
  .source-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #222;
  }
  .source-row:last-child { border-bottom: none; }
  .source-info { flex: 1; min-width: 0; }
  .source-name { font-size: 14px; color: #e0e0e0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .source-detail { font-size: 12px; color: #666; margin-top: 2px; }
  .source-size { font-size: 14px; font-weight: 600; color: #f87171; white-space: nowrap; }
  .btn-delete {
    padding: 8px 16px;
    background: #7f1d1d;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-delete:hover { background: #991b1b; }
  .btn-delete:disabled { background: #333; color: #666; cursor: not-allowed; }
  .btn-deleted {
    padding: 8px 16px;
    background: #166534;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: default;
  }
  .cleanup-total { margin-top: 16px; text-align: right; font-size: 13px; color: #888; }

  /* ---- Waveform ---- */
  .waveform-container {
    position: relative;
    height: 64px;
    background: #0a0a0a;
    cursor: pointer;
    user-select: none;
    border-top: 1px solid #222;
  }
  .waveform-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .waveform-cursor {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #fff;
    pointer-events: none;
    z-index: 2;
  }
  .waveform-trim-marker {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    pointer-events: none;
    z-index: 3;
  }
  .waveform-trim-in { background: #4ade80; }
  .waveform-trim-out { background: #f87171; }
  .waveform-dimmed {
    position: absolute;
    top: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.55);
    pointer-events: none;
    z-index: 1;
  }

  /* ---- Compilation builder ---- */
  .comp-list {
    min-height: 60px;
    background: #0a0a0a;
    border: 2px dashed #333;
    border-radius: 8px;
    padding: 8px;
    margin-bottom: 12px;
  }
  .comp-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: #1a1a1a;
    border-radius: 6px;
    margin-bottom: 4px;
    cursor: grab;
  }
  .comp-item:active { cursor: grabbing; }
  .comp-item .drag-handle { color: #555; cursor: grab; font-size: 14px; flex-shrink: 0; }
  .comp-item .comp-clip-name { flex: 1; font-size: 13px; color: #e0e0e0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .comp-item .comp-clip-dur { font-size: 12px; color: #888; flex-shrink: 0; }
  .comp-item .comp-remove { color: #666; cursor: pointer; font-size: 16px; flex-shrink: 0; border: none; background: none; padding: 2px 6px; }
  .comp-item .comp-remove:hover { color: #f87171; }
  .comp-summary { font-size: 13px; color: #888; margin-bottom: 12px; }
  .comp-controls { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; margin-bottom: 16px; }
  .comp-past-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #222;
  }
  .comp-past-item:last-child { border-bottom: none; }

  /* ---- Overlay spinner ---- */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 16px;
  }
  .overlay.active { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid #333;
    border-top-color: #60a5fa;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .overlay-text { color: #ccc; font-size: 15px; font-weight: 500; }

  .keyboard-hint { text-align: center; font-size: 12px; color: #555; padding-top: 8px; }
  kbd {
    display: inline-block; padding: 2px 6px; background: #222;
    border: 1px solid #333; border-radius: 4px;
    font-family: inherit; font-size: 11px; color: #aaa;
  }

  /* ---- Export view ---- */
  .export-section {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .export-section h2 {
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 16px;
  }
  .export-toolbar {
    display: flex;
    gap: 12px;
    align-items: end;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .clip-table { width: 100%; border-collapse: collapse; }
  .clip-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #222;
  }
  .clip-row:last-child { border-bottom: none; }
  .clip-checkbox {
    width: 18px;
    height: 18px;
    accent-color: #2563eb;
    cursor: pointer;
    flex-shrink: 0;
  }
  .clip-name {
    font-size: 14px;
    color: #e0e0e0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
    flex: 1;
  }
  .clip-detail {
    font-size: 12px;
    color: #888;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-encoded { background: #166534; color: #4ade80; }
  .badge-uploaded { background: #1e3a5f; color: #60a5fa; }
  .badge-error { background: #7f1d1d; color: #f87171; }
  .badge-uploading { background: #3b2f1f; color: #fbbf24; }
  .badge-ready { background: #2a2a2a; color: #888; }

  .progress-bar {
    height: 8px;
    background: #2a2a2a;
    border-radius: 4px;
    overflow: hidden;
    margin-top: 12px;
  }
  .progress-fill {
    height: 100%;
    background: #2563eb;
    border-radius: 4px;
    transition: width 0.3s;
    width: 0%;
  }
  .progress-label {
    font-size: 13px;
    color: #aaa;
    margin-top: 8px;
  }

  .yt-auth-section {
    display: flex;
    align-items: end;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .yt-auth-section .form-group input[type="text"],
  .yt-auth-section .form-group input[type="password"] {
    padding: 10px 12px;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
    width: 240px;
  }
  .yt-auth-section .form-group input:focus { border-color: #60a5fa; }
  .yt-connected {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: #0f0f0f;
    border: 1px solid #166534;
    border-radius: 8px;
    margin-bottom: 16px;
  }
  .yt-connected .yt-channel {
    font-size: 14px;
    color: #4ade80;
    font-weight: 600;
  }
  .yt-help {
    font-size: 12px;
    color: #666;
    margin-top: 4px;
  }

  .yt-settings {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .yt-settings .form-group.full-width {
    grid-column: 1 / -1;
  }

  .select-styled {
    padding: 10px 12px;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
    cursor: pointer;
    appearance: auto;
  }
  .select-styled:focus { border-color: #60a5fa; }

  .textarea-styled {
    padding: 10px 12px;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
    min-height: 80px;
    resize: vertical;
  }
  .textarea-styled:focus { border-color: #60a5fa; }

  .title-input {
    padding: 8px 10px;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 6px;
    color: #fff;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
    flex: 1;
    min-width: 0;
  }
  .title-input:focus { border-color: #60a5fa; }

  .template-vars {
    font-size: 11px;
    color: #555;
    margin-top: 4px;
  }
  .template-vars code {
    background: #1a1a1a;
    padding: 1px 4px;
    border-radius: 3px;
    color: #888;
  }

  .btn-secondary {
    padding: 10px 20px;
    background: #333;
    color: #ccc;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-secondary:hover { background: #444; }

  .btn-cancel {
    padding: 8px 16px;
    background: #7f1d1d;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-cancel:hover { background: #991b1b; }

  .btn-signout {
    padding: 8px 14px;
    background: #333;
    color: #aaa;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-signout:hover { background: #444; color: #fff; }

  .upload-link {
    color: #60a5fa;
    text-decoration: none;
    font-size: 12px;
  }
  .upload-link:hover { text-decoration: underline; }

  .playlist-row {
    display: flex;
    gap: 8px;
    align-items: end;
  }
  .playlist-row .select-styled { flex: 1; }
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <div class="overlay-text" id="overlayText">Trimming...</div>
</div>

<div class="header">
  <h1>ClipCutter</h1>
  <div class="tabs">
    <div class="tab active" data-tab="process" onclick="switchTab('process')">Process</div>
    <div class="tab" data-tab="review" onclick="switchTab('review')">Review</div>
    <div class="tab" data-tab="export" onclick="switchTab('export')">Export</div>
  </div>
  <div class="header-right" id="headerRight"></div>
</div>

<div class="main">
  <!-- ============ PROCESS VIEW ============ -->
  <div class="view active" id="view-process">
    <div class="form-section">
      <h2>Process Videos</h2>
      <div class="form-row">
        <div class="form-group wide">
          <label>Video folder</label>
          <input type="text" id="folderPath" placeholder="C:\path\to\videos" />
        </div>
        <div class="form-group">
          <label>Sensitivity</label>
          <input type="number" id="sensitivity" value="1.0" min="0.1" max="5.0" step="0.1" />
        </div>
        <div class="form-group">
          <label>Context (s)</label>
          <input type="number" id="context" placeholder="20" min="0" step="1" />
        </div>
        <button class="btn-process" id="btnProcess" onclick="startProcessing()">Process</button>
      </div>
    </div>
    <div class="log-box" id="logBox"></div>
  </div>

  <!-- ============ REVIEW VIEW ============ -->
  <div class="view" id="view-review">
    <div id="reviewContent">
      <div class="empty-state">No pending clips. Process some videos first.</div>
    </div>
  </div>

  <!-- ============ EXPORT VIEW ============ -->
  <div class="view" id="view-export">
    <div id="exportContent">
      <div class="empty-state">Loading export data...</div>
    </div>
  </div>
</div>

<script>
// ---- Tab switching ----
let activeTab = 'process';

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('view-' + tab).classList.add('active');

  // Stop waveform animation when leaving review tab
  if (tab !== 'review' && waveformAnimFrame) {
    cancelAnimationFrame(waveformAnimFrame);
    waveformAnimFrame = null;
  }

  if (tab === 'review') loadClips();
  if (tab === 'export') loadExportTab();
}

// ---- Processing ----
let pollTimer = null;

async function startProcessing() {
  const folder = document.getElementById('folderPath').value.trim();
  if (!folder) { alert('Enter a folder path.'); return; }

  const sensitivity = parseFloat(document.getElementById('sensitivity').value) || 1.0;
  const ctxVal = document.getElementById('context').value.trim();
  const context = ctxVal ? parseFloat(ctxVal) : null;

  const btn = document.getElementById('btnProcess');
  btn.disabled = true;
  btn.textContent = 'Processing...';
  document.getElementById('logBox').innerHTML = '';

  try {
    const res = await fetch('/api/process', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({folder, sensitivity, context}),
    });
    if (!res.ok) {
      const err = await res.json();
      alert(err.detail || 'Failed to start processing');
      btn.disabled = false;
      btn.textContent = 'Process';
      return;
    }
    pollTimer = setInterval(pollStatus, 800);
  } catch (e) {
    alert('Error: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Process';
  }
}

async function pollStatus() {
  const res = await fetch('/api/process/status');
  const data = await res.json();
  const box = document.getElementById('logBox');

  box.innerHTML = data.log.map(line =>
    `<div class="log-line">${escapeHtml(line)}</div>`
  ).join('');
  box.scrollTop = box.scrollHeight;

  if (!data.running) {
    clearInterval(pollTimer);
    pollTimer = null;
    const btn = document.getElementById('btnProcess');
    btn.disabled = false;
    btn.textContent = 'Process';

    if (data.error) {
      box.innerHTML += `<div class="log-line log-error">Error: ${escapeHtml(data.error)}</div>`;
    } else {
      box.innerHTML += `<div class="log-line log-done">Done! Switch to Review tab to review clips.</div>`;
    }
    box.scrollTop = box.scrollHeight;
  }
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// ---- Trim helpers ----
function fmtTimePrecise(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  const ms = Math.round((seconds % 1) * 10);
  return `${m}:${String(s).padStart(2, '0')}.${ms}`;
}

function parseTrimTime(str) {
  const parts = str.trim().split(':');
  if (parts.length === 2) {
    return parseInt(parts[0]) * 60 + parseFloat(parts[1]);
  }
  return parseFloat(str) || 0;
}

function setTrimPoint(which) {
  const player = document.getElementById('player');
  if (!player) return;
  const time = player.currentTime;
  const input = document.getElementById(which === 'in' ? 'trimIn' : 'trimOut');
  input.value = fmtTimePrecise(time);
  updateTrimIndicator();
}

function seekTo(which) {
  const player = document.getElementById('player');
  if (!player) return;
  const input = document.getElementById(which === 'in' ? 'trimIn' : 'trimOut');
  player.currentTime = parseTrimTime(input.value);
}

function updateTrimIndicator() {
  const clip = clips[currentIndex];
  if (!clip) return;
  const inVal = parseTrimTime(document.getElementById('trimIn').value);
  const outVal = parseTrimTime(document.getElementById('trimOut').value);
  const indicator = document.getElementById('trimIndicator');
  const trimmed = inVal > 0.1 || (clip.duration - outVal) > 0.1;
  if (trimmed) {
    const newDur = Math.max(0, outVal - inVal);
    indicator.textContent = `Trimmed: ${newDur.toFixed(1)}s`;
    indicator.className = 'trim-indicator active';
  } else {
    indicator.textContent = '';
    indicator.className = 'trim-indicator';
  }
  updateWaveformTrimMarkers();
}

// ---- Waveform ----
let waveformData = null;
let waveformAnimFrame = null;

const REGION_COLORS = {
  volume_spike: '#f87171',
  laughter: '#4ade80',
  shouting: '#fbbf24',
  sudden_noise: '#60a5fa',
  fallback: '#888',
};

async function loadWaveform(videoStem, filename, highlightRegions) {
  waveformData = null;
  if (waveformAnimFrame) { cancelAnimationFrame(waveformAnimFrame); waveformAnimFrame = null; }

  try {
    const res = await fetch(`/api/waveform/${videoStem}/${filename}`);
    if (!res.ok) return;
    const data = await res.json();
    waveformData = data;
    // Use highlight_regions from API if available, else use what was passed
    if (!waveformData.highlight_regions || waveformData.highlight_regions.length === 0) {
      waveformData.highlight_regions = highlightRegions;
    }
    renderWaveform();
    startWaveformSync();
  } catch (e) {
    console.error('Waveform load failed:', e);
  }
}

function renderWaveform() {
  const canvas = document.getElementById('waveformCanvas');
  if (!canvas || !waveformData) return;
  const ctx = canvas.getContext('2d');

  // Set canvas resolution to match display size
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const w = rect.width;
  const h = rect.height;

  ctx.clearRect(0, 0, w, h);

  const bars = waveformData.waveform;
  const dur = waveformData.duration;
  const regions = waveformData.highlight_regions || [];

  // Draw highlight region backgrounds
  for (const region of regions) {
    const x1 = (region.offset / dur) * w;
    const x2 = ((region.offset + region.duration) / dur) * w;
    const color = REGION_COLORS[region.type] || '#fbbf24';
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.12;
    ctx.fillRect(x1, 0, Math.max(x2 - x1, 2), h);
  }
  ctx.globalAlpha = 1.0;

  // Draw waveform bars
  const barWidth = w / bars.length;
  const gap = Math.max(0.5, barWidth * 0.15);
  for (let i = 0; i < bars.length; i++) {
    const val = bars[i];
    const barH = Math.max(1, val * h * 0.9);
    const x = i * barWidth;
    const y = (h - barH) / 2;

    // Color bar based on whether it's in a highlight region
    let inRegion = false;
    const barTime = (i / bars.length) * dur;
    for (const region of regions) {
      if (barTime >= region.offset && barTime <= region.offset + region.duration) {
        ctx.fillStyle = REGION_COLORS[region.type] || '#fbbf24';
        inRegion = true;
        break;
      }
    }
    if (!inRegion) ctx.fillStyle = '#3b82f6';

    ctx.globalAlpha = 0.85;
    ctx.fillRect(x + gap / 2, y, barWidth - gap, barH);
  }
  ctx.globalAlpha = 1.0;
}

function startWaveformSync() {
  const player = document.getElementById('player');
  if (!player) return;

  function tick() {
    const cursor = document.getElementById('waveformCursor');
    if (!cursor || !player.duration) {
      waveformAnimFrame = requestAnimationFrame(tick);
      return;
    }
    const pct = (player.currentTime / player.duration) * 100;
    cursor.style.left = pct + '%';
    waveformAnimFrame = requestAnimationFrame(tick);
  }
  waveformAnimFrame = requestAnimationFrame(tick);
}

function updateWaveformTrimMarkers() {
  const player = document.getElementById('player');
  if (!player || !player.duration) return;

  const inEl = document.getElementById('trimIn');
  const outEl = document.getElementById('trimOut');
  if (!inEl || !outEl) return;

  const inVal = parseTrimTime(inEl.value);
  const outVal = parseTrimTime(outEl.value);
  const dur = player.duration;

  const inPct = (inVal / dur) * 100;
  const outPct = (outVal / dur) * 100;

  const trimInMarker = document.getElementById('waveformTrimIn');
  const trimOutMarker = document.getElementById('waveformTrimOut');
  const dimLeft = document.getElementById('waveformDimLeft');
  const dimRight = document.getElementById('waveformDimRight');

  const hasTrim = inVal > 0.1 || (dur - outVal) > 0.1;

  if (hasTrim && trimInMarker && trimOutMarker) {
    trimInMarker.style.display = 'block';
    trimInMarker.style.left = inPct + '%';
    trimOutMarker.style.display = 'block';
    trimOutMarker.style.left = outPct + '%';
    if (dimLeft) { dimLeft.style.width = inPct + '%'; }
    if (dimRight) { dimRight.style.width = (100 - outPct) + '%'; }
  } else {
    if (trimInMarker) trimInMarker.style.display = 'none';
    if (trimOutMarker) trimOutMarker.style.display = 'none';
    if (dimLeft) dimLeft.style.width = '0';
    if (dimRight) dimRight.style.width = '0';
  }
}

// Click-to-seek on waveform
document.addEventListener('click', (e) => {
  const container = document.getElementById('waveformContainer');
  if (!container || !container.contains(e.target) || e.target.tagName === 'INPUT') return;
  const player = document.getElementById('player');
  if (!player || !player.duration) return;
  const rect = container.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  player.currentTime = pct * player.duration;
});

function showOverlay(text) {
  document.getElementById('overlayText').textContent = text;
  document.getElementById('overlay').classList.add('active');
}
function hideOverlay() {
  document.getElementById('overlay').classList.remove('active');
}

async function clipAction(type) {
  const clip = clips[currentIndex];
  const player = document.getElementById('player');
  if (player) player.pause();

  if (type === 'keep') {
    const trimStart = parseTrimTime(document.getElementById('trimIn')?.value || '0');
    const trimEnd = parseTrimTime(document.getElementById('trimOut')?.value || '0');
    const customName = document.getElementById('clipCustomName')?.value?.trim() || null;
    const needsTrim = trimStart > 0.1 || (clip.duration - trimEnd) > 0.1;

    if (needsTrim) showOverlay('Trimming clip...');
    else showOverlay('Saving clip...');
    const body = {trim_start: trimStart, trim_end: trimEnd, needs_trim: needsTrim, custom_name: customName};
    const res = await fetch(`/api/clips/${clip.video_stem}/${clip.filename}/keep`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    hideOverlay();
    if (!res.ok) {
      const err = await res.json();
      alert(err.detail || 'Keep failed');
      return;
    }
    results[currentIndex] = 'kept';
  } else if (type === 'discard') {
    await fetch(`/api/clips/${clip.video_stem}/${clip.filename}/discard`, {method: 'POST'});
    results[currentIndex] = 'discarded';
  } else {
    results[currentIndex] = 'skipped';
  }

  currentIndex++;
  showClip();
}

async function showDone() {
  const kept = results.filter(r => r === 'kept').length;
  const discarded = results.filter(r => r === 'discarded').length;
  const skipped = results.filter(r => r === 'skipped').length;

  document.getElementById('headerRight').textContent = 'Done';

  let html = `
    <div class="done-state">
      <h2>Review Complete</h2>
      <p>${kept} kept &middot; ${discarded} discarded &middot; ${skipped} skipped</p>
    </div>
  `;

  // Fetch source videos eligible for cleanup
  try {
    const res = await fetch('/api/sources');
    const data = await res.json();
    const deletable = data.sources.filter(s => s.fully_reviewed && s.exists);

    if (deletable.length > 0) {
      const totalMb = deletable.reduce((sum, s) => sum + s.size_mb, 0);
      html += `<div class="cleanup-section">`;
      html += `<h3>Delete Original Videos</h3>`;
      html += `<p style="color:#888;font-size:13px;margin-bottom:16px;">These source videos have been fully reviewed. Delete them to free disk space.</p>`;

      for (const src of deletable) {
        const name = src.source_path.split(/[/\\]/).pop();
        html += `
          <div class="source-row" id="src-${src.video_stem}">
            <div class="source-info">
              <div class="source-name" title="${escapeHtml(src.source_path)}">${escapeHtml(name)}</div>
              <div class="source-detail">${src.kept} kept, ${src.discarded} discarded</div>
            </div>
            <div class="source-size">${src.size_mb} MB</div>
            <button class="btn-delete" onclick="deleteSource('${src.video_stem}', this)">Delete</button>
          </div>
        `;
      }

      html += `<div class="cleanup-total">Total reclaimable: ${totalMb.toFixed(1)} MB</div>`;
      html += `</div>`;
    }
  } catch (e) {
    console.error('Failed to load sources:', e);
  }

  document.getElementById('reviewContent').innerHTML = html;
}

async function deleteSource(videoStem, btn) {
  if (!confirm('Permanently delete this source video? This cannot be undone.')) return;

  btn.disabled = true;
  btn.textContent = 'Deleting...';

  try {
    const res = await fetch('/api/sources/' + videoStem + '/delete', {method: 'POST'});
    if (!res.ok) {
      const err = await res.json();
      alert(err.detail || 'Failed to delete');
      btn.disabled = false;
      btn.textContent = 'Delete';
      return;
    }
    const data = await res.json();
    const row = document.getElementById('src-' + videoStem);
    const delBtn = row.querySelector('.btn-delete');
    delBtn.outerHTML = '<button class="btn-deleted">Deleted</button>';
    let label = data.freed_mb + ' MB freed';
    if (data.leftover > 0) label += ` (${data.leftover} clip(s) locked, will clean on restart)`;
    row.querySelector('.source-size').textContent = label;
    row.querySelector('.source-size').style.color = data.leftover > 0 ? '#fbbf24' : '#4ade80';
  } catch (e) {
    alert('Error: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Delete';
  }
}

function fmtTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

    html += `<div id="compProgress" style="display:none">`;
    html += `<div style="display:flex;align-items:center;gap:12px">`;
    html += `<span class="progress-label" id="compProgressLabel"></span>`;
    html += `<button class="btn-cancel" onclick="cancelCompilation()">Cancel</button>`;
    html += `</div>`;
    html += `<div class="progress-bar"><div class="progress-fill" id="compProgressFill"></div></div>`;
    html += `</div>`;

    // Past compilations
    html += `<div id="pastCompilations"></div>`;
    html += `</div>`;
  }

  // === YouTube Upload Section ===
  html += `<div class="export-section">`;
  html += `<h2>YouTube Upload</h2>`;

  // Auth section
  if (!ytAuthenticated) {
    html += `<div class="yt-auth-section">`;
    html += `<div class="form-group">`;
    html += `<label>Client ID</label>`;
    html += `<input type="text" id="ytClientId" placeholder="OAuth Client ID">`;
    html += `</div>`;
    html += `<div class="form-group">`;
    html += `<label>Client Secret</label>`;
    html += `<input type="password" id="ytClientSecret" placeholder="OAuth Client Secret">`;
    html += `</div>`;
    html += `<button class="btn-process" onclick="startYouTubeAuth()">Sign In</button>`;
    html += `</div>`;
    html += `<p class="yt-help">Create OAuth credentials at <a href="https://console.cloud.google.com" target="_blank" style="color:#60a5fa">console.cloud.google.com</a></p>`;

    html += `<div class="yt-connected">`;
    html += `<span style="color:#888;font-size:13px">Connected as:</span>`;
    html += `<span class="yt-channel">${escapeHtml(ytChannelName)}</span>`;
    html += `<button class="btn-signout" onclick="revokeYouTubeAuth()">Sign Out</button>`;
    html += `</div>`;

    // Batch settings
    html += `<div class="yt-settings">`;
    html += `<div class="form-group">`;
    html += `<label>Privacy</label>`;
    html += `<select class="select-styled" id="ytPrivacy">`;
    html += `<option value="private" selected>Private</option>`;
    html += `<option value="unlisted">Unlisted</option>`;
    html += `<option value="public">Public</option>`;
    html += `</select></div>`;

    html += `<div class="form-group">`;
    html += `<label>Playlist</label>`;
    html += `<div class="playlist-row">`;
    html += `<select class="select-styled" id="ytPlaylist">`;
    html += `<option value="">None</option>`;
    for (const pl of ytPlaylists) {
      html += `<option value="${escapeHtml(pl.id)}">${escapeHtml(pl.title)} (${pl.item_count})</option>`;
    }
    html += `<option value="__create__">+ Create New...</option>`;
    html += `</select></div></div>`;

    html += `<div class="form-group">`;
    html += `<label>Category</label>`;
    html += `<select class="select-styled" id="ytCategory">`;
    html += `<option value="20" selected>Gaming</option>`;
    html += `<option value="24">Entertainment</option>`;
    html += `<option value="22">People &amp; Blogs</option>`;
    html += `<option value="17">Sports</option>`;
    html += `<option value="10">Music</option>`;
    html += `<option value="1">Film &amp; Animation</option>`;
    html += `<option value="23">Comedy</option>`;
    html += `</select></div>`;

    html += `<div class="form-group">`;
    html += `<label>Tags</label>`;
    html += `<input type="text" class="title-input" id="ytTags" placeholder="tag1, tag2, tag3" style="width:100%">`;
    html += `</div>`;

    html += `<div class="form-group full-width">`;
    html += `<label>Description Template</label>`;
    html += `<textarea class="textarea-styled" id="ytDescription" placeholder="Enter a description template..."></textarea>`;
    html += `<div class="template-vars">Variables: <code>{source_video}</code> <code>{start_time}</code> <code>{end_time}</code> <code>{duration}</code> <code>{detection_reasons}</code></div>`;
    html += `</div>`;
    html += `</div>`;

    // Upload toolbar
    html += `<div class="export-toolbar">`;
    html += `<button class="btn-secondary" onclick="toggleAllClips('upload')">Select All</button>`;
    html += `<button class="btn-process" id="btnUpload" onclick="startUpload()">Upload Selected</button>`;

    // Upload progress area (hidden by default)

    html += `<div class="progress-bar"><div class="progress-fill" id="uploadProgressFill"></div></div>`;

    // Upload clip list

    } else {
      html += `<div id="uploadClipList">`;
      for (let i = 0; i < keptClips.length; i++) {
        const clip = keptClips[i];
        const defaultTitle = clip.custom_name || formatClipTitle(clip.filename);
        let statusHtml = `<span class="badge badge-ready">Ready</span>`;
        const alreadyUploaded = !!clip.youtube_url;
        if (clip.youtube_upload_status === 'failed') {
          statusHtml = `<span class="badge badge-error">Failed</span>`;
        } else if (alreadyUploaded) {
          statusHtml = `<a class="upload-link" href="${escapeHtml(clip.youtube_url)}" target="_blank">Uploaded</a>`;
        }
        html += `<div class="clip-row" id="upload-row-${i}">`;
        html += `<input type="checkbox" class="clip-checkbox upload-cb" data-index="${i}" ${alreadyUploaded ? '' : 'checked'}>`;

      }
    };

    presetSelect.addEventListener('change', updateSlowdownVisibility);

  const plSelect = document.getElementById('ytPlaylist');
  if (plSelect) {
    plSelect.addEventListener('change', function() {
      if (this.value === '__create__') {
        createPlaylist();
        this.value = '';
      }
    });
  }

  // Initialize compilation builder state
  renderCompilationList();
  loadPastCompilations();
}

function formatClipTitle(filename) {
  // Remove extension and replace underscores/hyphens with spaces
  let title = filename.replace(/\.[^.]+$/, '');
  title = title.replace(/[_-]/g, ' ');
  // Title-case first letter
  return title.charAt(0).toUpperCase() + title.slice(1);
}

function toggleAllClips(section) {
  const selector = section === 'encode' ? '.encode-cb' : '.upload-cb';
  const checkboxes = document.querySelectorAll(selector);
  if (checkboxes.length === 0) return;
  // If all are checked, uncheck all; otherwise check all
  const allChecked = Array.from(checkboxes).every(cb => cb.checked);
  checkboxes.forEach(cb => cb.checked = !allChecked);
}

async function startEncoding() {
  const checkboxes = document.querySelectorAll('.encode-cb:checked');
  if (checkboxes.length === 0) { alert('Select at least one clip to encode.'); return; }

  const preset = document.getElementById('encodePreset').value;
  const fpsVal = document.getElementById('encodeFps').value;
  const fps = fpsVal ? parseInt(fpsVal) : null;
  const slowdownVal = document.getElementById('encodeSlowdown').value;
  const slowdown = slowdownVal ? parseFloat(slowdownVal) : null;

  const clips_to_encode = [];
  checkboxes.forEach(cb => {
    const idx = parseInt(cb.dataset.index);
    const clip = keptClips[idx];
    if (clip) clips_to_encode.push({video_stem: clip.video_stem, filename: clip.filename});
  });

  const btn = document.getElementById('btnEncode');
  btn.disabled = true;
  btn.textContent = 'Encoding...';

  try {
    const res = await fetch('/api/encode', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({clips: clips_to_encode, preset, target_fps: fps, slowdown_factor: slowdown}),
    });
    if (!res.ok) {
      const err = await res.json();
      alert(err.detail || 'Failed to start encoding');
      btn.disabled = false;
      btn.textContent = 'Encode Selected';
      return;
    }
    document.getElementById('encodeProgress').style.display = 'block';
    encodingPoll = setInterval(pollEncodingStatus, 800);
  } catch (e) {
    alert('Error: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Encode Selected';
  }
}

async function pollEncodingStatus() {
  try {
    const res = await fetch('/api/encode/status');
    const data = await res.json();

    const label = document.getElementById('encodeProgressLabel');
    const fill = document.getElementById('encodeProgressFill');

    if (data.total > 0) {
      // current_index is 1-based from backend
      const completedCount = (data.completed || []).length;
      const pct = Math.round((completedCount / data.total) * 100);
      label.textContent = `Encoding clip ${data.current_index || 0} of ${data.total}: ${data.current_file || ''}`;
      fill.style.width = pct + '%';
    }

    if (!data.running) {
      clearInterval(encodingPoll);
      encodingPoll = null;

      const btn = document.getElementById('btnEncode');
      btn.disabled = false;
      btn.textContent = 'Encode Selected';

      fill.style.width = '100%';
      if (data.errors && data.errors.length > 0) {
        label.textContent = `Done with ${data.errors.length} error(s). ${(data.completed || []).length} clip(s) encoded.`;
      } else {
        label.textContent = `Encoding complete! ${(data.completed || []).length} clip(s) encoded.`;
      }

      // Refresh the clip list to show updated badges
      await loadExportTab();
    }
  } catch (e) {
    console.error('Encoding poll error:', e);
  }
}

async function cancelEncoding() {
  try {
    await fetch('/api/encode/cancel', {method: 'POST'});
  } catch (e) {
    console.error('Cancel encoding error:', e);
  }
}

async function startYouTubeAuth() {
  const clientId = document.getElementById('ytClientId').value.trim();
  const clientSecret = document.getElementById('ytClientSecret').value.trim();
  if (!clientId || !clientSecret) {
    alert('Enter both Client ID and Client Secret.');
    return;
  }

  try {
    const res = await fetch('/api/youtube/auth/start', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({client_id: clientId, client_secret: clientSecret}),
    });
    if (!res.ok) {
      const err = await res.json();
      alert(err.detail || 'Failed to start auth');
      return;
    }
    const data = await res.json();
    const authWindow = window.open(data.auth_url, 'youtube-auth', 'width=600,height=700');

    // Listen for auth completion message from popup
    const authListener = async function(event) {
      if (event.origin !== window.location.origin) return;
      if (event.data && event.data.type === 'youtube-auth-success') {
        window.removeEventListener('message', authListener);
        // Refresh auth status
        try {
          const statusRes = await fetch('/api/youtube/status');
          const statusData = await statusRes.json();
          ytAuthenticated = statusData.authenticated || false;
          ytChannelName = statusData.channel_name || '';
          if (ytAuthenticated) {
            const plRes = await fetch('/api/youtube/playlists');
            const plData = await plRes.json();
            ytPlaylists = plData.playlists || [];
          }
        } catch (e) {
          console.error('Failed to refresh auth status:', e);
        }
        renderExportView();
      }
    };
    window.addEventListener('message', authListener);
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function revokeYouTubeAuth() {
  if (!confirm('Sign out from YouTube?')) return;
  try {
    await fetch('/api/youtube/auth/revoke', {method: 'POST'});
    ytAuthenticated = false;
    ytChannelName = '';
    ytPlaylists = [];
    renderExportView();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function startUpload() {
  const checkboxes = document.querySelectorAll('.upload-cb:checked');
  if (checkboxes.length === 0) { alert('Select at least one clip to upload.'); return; }

  const privacy = document.getElementById('ytPrivacy').value;
  const playlistId = document.getElementById('ytPlaylist').value;
  const categoryId = document.getElementById('ytCategory').value;
  const tags = document.getElementById('ytTags').value.trim();
  const descTemplate = document.getElementById('ytDescription').value;

  const clipsToUpload = [];
  checkboxes.forEach(cb => {
    const idx = parseInt(cb.dataset.index);
    const clip = keptClips[idx];
    if (!clip) return;
    const titleInput = document.querySelector(`.upload-title[data-index="${idx}"]`);
    const title = titleInput ? titleInput.value.trim() : (clip.custom_name || formatClipTitle(clip.filename));

    // Build description from template
    let description = descTemplate;
    description = description.replace(/\{source_video\}/g, clip.source_video || '');
    description = description.replace(/\{start_time\}/g, clip.start_time ? fmtTime(clip.start_time) : '');
    description = description.replace(/\{end_time\}/g, clip.end_time ? fmtTime(clip.end_time) : '');
    description = description.replace(/\{duration\}/g, clip.duration ? Math.round(clip.duration) + 's' : '');
    description = description.replace(/\{detection_reasons\}/g, (clip.detection_reasons || []).join(', '));

    clipsToUpload.push({
      video_stem: clip.video_stem,
      filename: clip.filename,
      use_encoded: !!clip.encoded_exists,
      title: title,
      description: description,
      tags: tags ? tags.split(',').map(t => t.trim()).filter(t => t) : [],
      category_id: categoryId,
      privacy: privacy,
      playlist_id: playlistId || null,
    });
  });

  const btn = document.getElementById('btnUpload');
  btn.disabled = true;
  btn.textContent = 'Uploading...';

  try {
    const res = await fetch('/api/youtube/upload', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({clips: clipsToUpload}),
    });
    if (!res.ok) {
      const err = await res.json();
      alert(err.detail || 'Failed to start upload');
      btn.disabled = false;
      btn.textContent = 'Upload Selected';
      return;
    }
    document.getElementById('uploadProgress').style.display = 'block';
    uploadPoll = setInterval(pollUploadStatus, 1000);
  } catch (e) {
    alert('Error: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Upload Selected';
  }
}

async function pollUploadStatus() {
  try {
    const res = await fetch('/api/youtube/upload/status');
    const data = await res.json();

    const label = document.getElementById('uploadProgressLabel');
    const fill = document.getElementById('uploadProgressFill');

    if (data.total > 0) {
      const filePct = data.bytes_total > 0
        ? Math.round((data.bytes_sent / data.bytes_total) * 100)
        : 0;
      // Overall progress: completed clips + fractional progress on current clip
      const completedClips = (data.completed || []).length;
      const overallPct = Math.round(((completedClips + filePct / 100) / data.total) * 100);
      label.textContent = `Uploading clip ${data.current_index || 0} of ${data.total}: ${data.current_file || ''} (${filePct}%)`;
      fill.style.width = overallPct + '%';
    }

    // Update per-clip statuses
    if (data.completed) {
      for (const c of data.completed) {
        // Find the clip index
        const idx = keptClips.findIndex(k => k.filename === c.filename);
        if (idx >= 0) {
          const row = document.getElementById('upload-row-' + idx);
          if (row) {
            const badge = row.querySelector('.badge, .upload-link');
            if (badge) {
              badge.outerHTML = `<a class="upload-link" href="${escapeHtml(c.url)}" target="_blank">Uploaded</a>`;
            }
          }
        }
      }
    }

    if (!data.running) {
      clearInterval(uploadPoll);
      uploadPoll = null;

      const btn = document.getElementById('btnUpload');
      btn.disabled = false;
      btn.textContent = 'Upload Selected';

      fill.style.width = '100%';
      if (data.errors && data.errors.length > 0) {
        label.textContent = `Done with ${data.errors.length} error(s). ${(data.completed || []).length} clip(s) uploaded.`;
      } else {
        label.textContent = `Upload complete! ${(data.completed || []).length} clip(s) uploaded.`;
      }
    }
  } catch (e) {
    console.error('Upload poll error:', e);
  }
}

async function cancelUpload() {
  try {
    await fetch('/api/youtube/upload/cancel', {method: 'POST'});
  } catch (e) {
    console.error('Cancel upload error:', e);
  }
}

async function createPlaylist() {
  const title = prompt('New playlist title:');
  if (!title || !title.trim()) {
    // Reset dropdown to None
    const plSelect = document.getElementById('ytPlaylist');
    if (plSelect) plSelect.value = '';
    return;
  }

  try {
    const res = await fetch('/api/youtube/playlists', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({title: title.trim(), privacy: 'private'}),
    });
    if (!res.ok) {
      const err = await res.json();
      alert(err.detail || 'Failed to create playlist');
      return;
    }
    const newPl = await res.json();
    ytPlaylists.push(newPl);

    const plSelect = document.getElementById('ytPlaylist');

function renderDescriptionPreview() {
  const descTemplate = document.getElementById('ytDescription');

// ---- Compilation builder ----
let compilationClips = [];
let compilationPoll = null;

function addSelectedToCompilation() {
  const checkboxes = document.querySelectorAll('.encode-cb:checked');
  if (checkboxes.length === 0) { alert('Check some clips first.'); return; }

  checkboxes.forEach(cb => {
    const idx = parseInt(cb.dataset.index);
    const clip = keptClips[idx];
    if (!clip) return;
    // Avoid duplicates
    if (compilationClips.some(c => c.video_stem === clip.video_stem && c.filename === clip.filename)) return;
    compilationClips.push({
      video_stem: clip.video_stem,
      filename: clip.filename,
      custom_name: clip.custom_name || clip.filename,
      duration: clip.duration || 0,
    });
  });
  renderCompilationList();
}

function renderCompilationList() {
  const list = document.getElementById('compList');
  if (!list) return;

  if (compilationClips.length === 0) {
    list.innerHTML = '<div style="padding:16px;text-align:center;color:#555;font-size:13px">Add clips using the checkboxes above</div>';
    updateCompDuration();
    return;
  }

  let html = '';
  for (let i = 0; i < compilationClips.length; i++) {
    const c = compilationClips[i];
    const dur = c.duration ? Math.round(c.duration) + 's' : '';
    html += `<div class="comp-item" draggable="true" data-idx="${i}">`;
    html += `<span class="drag-handle">&#x2630;</span>`;
    html += `<span class="comp-clip-name" title="${escapeHtml(c.filename)}">${escapeHtml(c.custom_name)}</span>`;
    html += `<span class="comp-clip-dur">${dur}</span>`;
    html += `<button class="comp-remove" onclick="removeCompClip(${i})">&times;</button>`;
    html += `</div>`;
  }
  list.innerHTML = html;
  initCompDragDrop();
  updateCompDuration();
}

function removeCompClip(idx) {
  compilationClips.splice(idx, 1);
  renderCompilationList();
}

function initCompDragDrop() {
  const list = document.getElementById('compList');
  if (!list) return;
  let dragIdx = null;

  list.querySelectorAll('.comp-item').forEach(item => {
    item.addEventListener('dragstart', (e) => {
      dragIdx = parseInt(item.dataset.idx);
      item.style.opacity = '0.4';
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => { item.style.opacity = '1'; });
    item.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
    item.addEventListener('drop', (e) => {
      e.preventDefault();
      const dropIdx = parseInt(item.dataset.idx);
      if (dragIdx !== null && dragIdx !== dropIdx) {
        const [moved] = compilationClips.splice(dragIdx, 1);
        compilationClips.splice(dropIdx, 0, moved);
        renderCompilationList();
      }
      dragIdx = null;
    });
  });
}

function updateCompDuration() {
  const summary = document.getElementById('compSummary');
  const xfadeGroup = document.getElementById('compXfadeGroup');
  const transition = document.getElementById('compTransition');

  if (xfadeGroup && transition) {
    xfadeGroup.style.display = transition.value === 'crossfade' ? 'flex' : 'none';
  }

  if (!summary) return;
  if (compilationClips.length === 0) {
    summary.textContent = 'No clips added yet.';
    return;
  }

  let total = compilationClips.reduce((sum, c) => sum + (c.duration || 0), 0);
  if (transition && transition.value === 'crossfade' && compilationClips.length > 1) {
    const xfadeDur = parseFloat(document.getElementById('compXfadeDur')?.value || '0.5');
    total -= (compilationClips.length - 1) * xfadeDur;
  }
  total = Math.max(0, total);
  const m = Math.floor(total / 60);
  const s = Math.round(total % 60);
  summary.textContent = `${compilationClips.length} clips \u2014 Total: ${m}:${String(s).padStart(2, '0')}`;
}

async function startCompilation() {
  if (compilationClips.length < 2) { alert('Add at least 2 clips.'); return; }

  const transition = document.getElementById('compTransition')?.value || 'cut';
  const xfadeDur = parseFloat(document.getElementById('compXfadeDur')?.value || '0.5');
  const title = document.getElementById('compTitle')?.value?.trim() || '';

  const btn = document.getElementById('btnBuildComp');
  btn.disabled = true;
  btn.textContent = 'Building...';

  try {
    const res = await fetch('/api/compilation', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        clips: compilationClips.map(c => ({video_stem: c.video_stem, filename: c.filename})),
        transition,
        crossfade_duration: xfadeDur,
        title,
      }),
    });
    if (!res.ok) {
      const err = await res.json();
      alert(err.detail || 'Failed to start compilation');
      btn.disabled = false;
      btn.textContent = 'Build';
      return;
    }
    document.getElementById('compProgress').style.display = 'block';
    compilationPoll = setInterval(pollCompilationStatus, 1000);
  } catch (e) {
    alert('Error: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Build';
  }
}

async function pollCompilationStatus() {
  try {
    const res = await fetch('/api/compilation/status');
    const data = await res.json();
    const label = document.getElementById('compProgressLabel');
    const fill = document.getElementById('compProgressFill');

    if (label) label.textContent = data.current_step || 'Building...';
    if (fill) fill.style.width = data.progress_pct + '%';

    if (!data.running) {
      clearInterval(compilationPoll);
      compilationPoll = null;
      const btn = document.getElementById('btnBuildComp');
      if (btn) { btn.disabled = false; btn.textContent = 'Build'; }
      if (fill) fill.style.width = '100%';

      if (data.error) {
        if (label) label.textContent = 'Error: ' + data.error;
      } else {
        if (label) label.textContent = 'Compilation complete! ' + (data.output_filename || '');
        compilationClips = [];
        renderCompilationList();
      }
      loadPastCompilations();
    }
  } catch (e) {
    console.error('Compilation poll error:', e);
  }
}

async function cancelCompilation() {
  try { await fetch('/api/compilation/cancel', {method: 'POST'}); } catch (e) {}
}

async function loadPastCompilations() {
  const container = document.getElementById('pastCompilations');
  if (!container) return;

  try {
    const res = await fetch('/api/compilations');
    const data = await res.json();
    const comps = (data.compilations || []).filter(c => c.file_exists);

    if (comps.length === 0) { container.innerHTML = ''; return; }

    let html = '<h3 style="font-size:14px;color:#fff;margin:16px 0 8px">Past Compilations</h3>';
    for (const comp of comps) {
      const dur = comp.total_duration ? Math.round(comp.total_duration) + 's' : '';
      const clipCount = (comp.clips || []).length;
      html += `<div class="comp-past-item">`;
      html += `<span class="clip-name" style="flex:1">${escapeHtml(comp.filename)}</span>`;
      html += `<span class="clip-detail">${clipCount} clips</span>`;
      html += `<span class="clip-detail">${dur}</span>`;
      html += `<a href="/video/compilation/${encodeURIComponent(comp.filename)}" target="_blank" class="upload-link">Play</a>`;
      html += `<button class="comp-remove" onclick="deleteCompilation('${escapeHtml(comp.compilation_id)}')">&times;</button>`;
      html += `</div>`;
    }
    container.innerHTML = html;
  } catch (e) {
    console.error('Failed to load compilations:', e);
  }
}

async function deleteCompilation(compId) {
  if (!confirm('Delete this compilation?')) return;
  try {
    await fetch('/api/compilation/' + compId, {method: 'DELETE'});
    loadPastCompilations();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

// ---- Load defaults ----
fetch('/api/defaults').then(r => r.json()).then(data => {
  document.getElementById('folderPath').value = data.folder;
});

// Update trim indicator when inputs change
document.addEventListener('input', (e) => {
  if (e.target.id === 'trimIn' || e.target.id === 'trimOut') updateTrimIndicator();
});

// ---- Keyboard shortcuts (only active on Review tab) ----
document.addEventListener('keydown', (e) => {
  if (activeTab !== 'review') return;
  if (currentIndex >= clips.length) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  switch(e.key.toLowerCase()) {
    case 'k': e.preventDefault(); clipAction('keep'); break;
    case 'd': e.preventDefault(); clipAction('discard'); break;
    case 's': e.preventDefault(); clipAction('skip'); break;
    case 'i': e.preventDefault(); setTrimPoint('in'); break;
    case 'o': e.preventDefault(); setTrimPoint('out'); break;
    case 'n': e.preventDefault(); const nameInput = document.getElementById('clipCustomName'); if (nameInput) nameInput.focus(); break;
    case ' ':
      e.preventDefault();
      const player = document.getElementById('player');
      if (player) player.paused ? player.play() : player.pause();
      break;
  }
});
</script>
