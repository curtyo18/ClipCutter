<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClipCutter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    min-height: 100vh;
  }

  /* ---- Header / Tabs ---- */
  .header {
    display: flex;
    align-items: center;
    padding: 0 24px;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    gap: 24px;
  }
  .header h1 { font-size: 18px; font-weight: 600; color: #fff; padding: 14px 0; }
  .tabs { display: flex; gap: 4px; }
  .tab {
    padding: 14px 18px;
    font-size: 14px;
    font-weight: 500;
    color: #888;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab:hover { color: #ccc; }
  .tab.active { color: #fff; border-bottom-color: #60a5fa; }
  .header-right { margin-left: auto; font-size: 13px; color: #666; }

  .main { max-width: 960px; margin: 0 auto; padding: 24px; }
  .view { display: none; }
  .view.active { display: block; }

  /* ---- Process view ---- */
  .form-section {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .form-section h2 { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 16px; }
  .form-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    align-items: end;
  }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.wide { flex: 1; }
  .form-group label { font-size: 12px; color: #888; font-weight: 500; }
  .form-group input[type="text"],
  .form-group input[type="number"] {
    padding: 10px 12px;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus { border-color: #60a5fa; }
  .form-group input[type="number"] { width: 100px; }

  .btn-process {
    padding: 10px 28px;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-process:hover { background: #1d4ed8; }
  .btn-process:disabled { background: #333; color: #666; cursor: not-allowed; }

  .btn-scan {
    padding: 10px 20px;
    background: #1e293b;
    color: #94a3b8;
    border: 1px solid #334155;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .btn-scan:hover { background: #273549; color: #e2e8f0; }
  .btn-scan:disabled { background: #111; color: #444; cursor: not-allowed; }

  .scan-panel {
    background: #111;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 16px;
  }
  .scan-panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .scan-panel-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #64748b;
  }
  .scan-panel-title.stale { color: #f87171; }
  .scan-panel-meta { font-size: 12px; color: #475569; }
  .scan-panel-error { font-size: 13px; color: #f87171; margin-bottom: 10px; }
  .scan-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .scan-table th {
    text-align: left;
    color: #475569;
    font-weight: 500;
    padding: 3px 0;
    border-bottom: 1px solid #1e293b;
  }
  .scan-table td { padding: 4px 0; color: #94a3b8; }
  .scan-table td.filename { color: #e2e8f0; }
  .scan-status-processed { color: #4ade80; }
  .scan-status-pending { color: #facc15; }
  .scan-status-unprocessed { color: #f87171; }
  .scan-stale-unprocessed { color: #fca5a5; }
  .scan-stale-processed { color: #fdba74; }
  .btn-delete-file {
    padding: 2px 10px;
    background: #7f1d1d;
    color: #fca5a5;
    border: none;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-delete-file:hover { background: #991b1b; }
  .btn-delete-file:disabled { background: #2d1111; color: #6b3333; cursor: not-allowed; }
  .stale-threshold-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #475569;
  }
  .stale-threshold-row input {
    width: 52px;
    padding: 3px 6px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 4px;
    color: #e2e8f0;
    font-size: 12px;
    text-align: center;
  }

  .log-box {
    background: #0a0a0a;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 16px;
    font-family: 'Consolas', 'SF Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    color: #aaa;
    max-height: 400px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .log-box .log-line { margin-bottom: 1px; }
  .log-box .log-done { color: #4ade80; font-weight: 600; }
  .log-box .log-error { color: #f87171; font-weight: 600; }
  .log-box:empty::after { content: 'Waiting to start...'; color: #444; }

  /* ---- Review view ---- */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: #666;
    font-size: 16px;
  }
  .player-section {
    background: #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  video {
    width: 100%;
    display: block;
    background: #000;
    max-height: 480px;
  }
  .clip-info { padding: 20px 24px; }
  .clip-title { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 8px; }
  .clip-meta {
    display: flex; gap: 20px; flex-wrap: wrap;
    font-size: 13px; color: #999; margin-bottom: 12px;
  }
  .clip-meta span { display: flex; align-items: center; gap: 4px; }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .tag {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 500;
  }
  .tag-volume_spike { background: #3b1f1f; color: #f87171; }
  .tag-laughter { background: #1f3b2a; color: #4ade80; }
  .tag-shouting { background: #3b2f1f; color: #fbbf24; }
  .tag-sudden_noise { background: #1f2a3b; color: #60a5fa; }
  .tag-fallback { background: #2a2a2a; color: #888; }
  .confidence-bar { height: 4px; background: #2a2a2a; border-radius: 2px; overflow: hidden; }
  .confidence-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

  .actions { display: flex; gap: 12px; padding: 0 24px 24px; }
  .btn {
    flex: 1; padding: 14px; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: transform 0.1s, opacity 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.97); }
  .btn .shortcut { font-size: 11px; font-weight: 400; opacity: 0.6; }
  .btn-keep { background: #166534; color: #fff; }
  .btn-skip { background: #333; color: #ccc; }
  .btn-discard { background: #7f1d1d; color: #fff; }

  /* ---- Trim controls ---- */
  .trim-section {
    padding: 0 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .segment-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .trim-label { font-size: 12px; color: #888; font-weight: 500; }
  .trim-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .trim-time {
    font-family: 'Consolas', 'SF Mono', monospace;
    font-size: 14px;
    color: #fff;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 6px 10px;
    width: 70px;
    text-align: center;
    outline: none;
  }
  .trim-time:focus { border-color: #60a5fa; }
  .trim-btn {
    padding: 6px 10px;
    background: #2a2a2a;
    color: #aaa;
    border: 1px solid #333;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .trim-btn:hover { background: #333; color: #fff; }
  .trim-indicator {
    margin-left: auto;
    font-size: 12px;
    color: #666;
  }
  .trim-indicator.active { color: #fbbf24; }

  /* ---- Custom name input ---- */
  .name-section {
    padding: 0 24px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .clip-name-input {
    flex: 1;
    padding: 8px 12px;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 6px;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .clip-name-input:focus { border-color: #60a5fa; }
  .clip-name-input::placeholder { color: #555; }

  .progress { display: flex; gap: 4px; margin-bottom: 20px; height: 3px; }
  .progress-dot { flex: 1; border-radius: 2px; background: #2a2a2a; transition: background 0.3s; }
  .progress-dot.done { background: #166534; }
  .progress-dot.discarded { background: #7f1d1d; }
  .progress-dot.current { background: #60a5fa; }

  .done-state { text-align: center; padding: 40px 24px; }
  .done-state h2 { font-size: 24px; color: #fff; margin-bottom: 12px; }
  .done-state p { color: #888; font-size: 15px; margin-bottom: 4px; }

  .cleanup-section {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 24px;
    margin-top: 24px;
    text-align: left;
  }
  .cleanup-section h3 { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 16px; }
  .source-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #222;
  }
  .source-row:last-child { border-bottom: none; }
  .source-info { flex: 1; min-width: 0; }
  .source-name { font-size: 14px; color: #e0e0e0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .source-detail { font-size: 12px; color: #666; margin-top: 2px; }
  .source-size { font-size: 14px; font-weight: 600; color: #f87171; white-space: nowrap; }
  .btn-delete {
    padding: 8px 16px;
    background: #7f1d1d;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-delete:hover { background: #991b1b; }
  .btn-delete:disabled { background: #333; color: #666; cursor: not-allowed; }
  .btn-deleted {
    padding: 8px 16px;
    background: #166534;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: default;
  }
  .cleanup-total { margin-top: 16px; text-align: right; font-size: 13px; color: #888; }

  /* ---- Waveform ---- */
  .waveform-container {
    position: relative;
    height: 64px;
    background: #0a0a0a;
    cursor: pointer;
    user-select: none;
    border-top: 1px solid #222;
  }
  .waveform-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .waveform-cursor {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #fff;
    pointer-events: none;
    z-index: 2;
  }
  .waveform-trim-marker {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    pointer-events: none;
    z-index: 3;
  }
  .waveform-trim-in { background: #4ade80; }
  .waveform-trim-out { background: #f87171; }
  .waveform-dimmed {
    position: absolute;
    top: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.55);
    pointer-events: none;
    z-index: 1;
  }

  /* ---- Compilation builder ---- */
  .comp-list {
    min-height: 60px;
    background: #0a0a0a;
    border: 2px dashed #333;
    border-radius: 8px;
    padding: 8px;
    margin-bottom: 12px;
  }
  .comp-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: #1a1a1a;
    border-radius: 6px;
    margin-bottom: 4px;
    cursor: grab;
  }
  .comp-item:active { cursor: grabbing; }
  .comp-item .drag-handle { color: #555; cursor: grab; font-size: 14px; flex-shrink: 0; }
  .comp-item .comp-clip-name { flex: 1; font-size: 13px; color: #e0e0e0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .comp-item .comp-clip-dur { font-size: 12px; color: #888; flex-shrink: 0; }
  .comp-item .comp-remove { color: #666; cursor: pointer; font-size: 16px; flex-shrink: 0; border: none; background: none; padding: 2px 6px; }
  .comp-item .comp-remove:hover { color: #f87171; }
  .comp-toolbar { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; margin-bottom: 16px; }
  .comp-footer { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .comp-summary { font-size: 13px; color: #888; flex: 1; }
  .comp-controls { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; margin-bottom: 16px; }
  .comp-past-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #222;
  }
  .comp-past-item:last-child { border-bottom: none; }

  /* ---- Overlay spinner ---- */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 16px;
  }
  .overlay.active { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid #333;
    border-top-color: #60a5fa;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .overlay-text { color: #ccc; font-size: 15px; font-weight: 500; }

  .keyboard-hint { text-align: center; font-size: 12px; color: #555; padding-top: 8px; }
  kbd {
    display: inline-block; padding: 2px 6px; background: #222;
    border: 1px solid #333; border-radius: 4px;
    font-family: inherit; font-size: 11px; color: #aaa;
  }

  /* ---- Export view ---- */
  .export-section {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .export-section h2 {
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 16px;
  }
  .export-toolbar {
    display: flex;
    gap: 12px;
    align-items: end;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .clip-table { width: 100%; border-collapse: collapse; }
  .clip-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #222;
  }
  .clip-row:last-child { border-bottom: none; }
  .clip-checkbox {
    width: 18px;
    height: 18px;
    accent-color: #2563eb;
    cursor: pointer;
    flex-shrink: 0;
  }
  .clip-name {
    font-size: 14px;
    color: #e0e0e0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
    flex: 1;
  }
  .clip-detail {
    font-size: 12px;
    color: #888;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-encoded { background: #166534; color: #4ade80; }
  .badge-uploaded { background: #1e3a5f; color: #60a5fa; }
  .badge-error { background: #7f1d1d; color: #f87171; }
  .badge-uploading { background: #3b2f1f; color: #fbbf24; }
  .badge-ready { background: #2a2a2a; color: #888; }

  .progress-bar {
    height: 8px;
    background: #2a2a2a;
    border-radius: 4px;
    overflow: hidden;
    margin-top: 12px;
  }
  .progress-fill {
    height: 100%;
    background: #2563eb;
    border-radius: 4px;
    transition: width 0.3s;
    width: 0%;
  }
  .progress-label {
    font-size: 13px;
    color: #aaa;
    margin-top: 8px;
  }

  .yt-auth-section {
    display: flex;
    align-items: end;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .yt-auth-section .form-group input[type="text"],
  .yt-auth-section .form-group input[type="password"] {
    padding: 10px 12px;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
    width: 240px;
  }
  .yt-auth-section .form-group input:focus { border-color: #60a5fa; }
  .yt-connected {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: #0f0f0f;
    border: 1px solid #166534;
    border-radius: 8px;
    margin-bottom: 16px;
  }
  .yt-connected .yt-channel {
    font-size: 14px;
    color: #4ade80;
    font-weight: 600;
  }
  .yt-help {
    font-size: 12px;
    color: #666;
    margin-top: 4px;
  }

  .yt-settings {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .yt-settings .form-group.full-width {
    grid-column: 1 / -1;
  }

  .select-styled {
    padding: 10px 12px;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
    cursor: pointer;
    appearance: auto;
  }
  .select-styled:focus { border-color: #60a5fa; }

  .textarea-styled {
    padding: 10px 12px;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
    min-height: 80px;
    resize: vertical;
  }
  .textarea-styled:focus { border-color: #60a5fa; }

  .title-input {
    padding: 8px 10px;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 6px;
    color: #fff;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
    flex: 1;
    min-width: 0;
  }
  .title-input:focus { border-color: #60a5fa; }

  .template-vars {
    font-size: 11px;
    color: #555;
    margin-top: 4px;
  }
  .template-vars code {
    background: #1a1a1a;
    padding: 1px 4px;
    border-radius: 3px;
    color: #888;
  }

  .btn-secondary {
    padding: 10px 20px;
    background: #333;
    color: #ccc;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-secondary:hover { background: #444; }

  .btn-cancel {
    padding: 8px 16px;
    background: #7f1d1d;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-cancel:hover { background: #991b1b; }

  .btn-signout {
    padding: 8px 14px;
    background: #333;
    color: #aaa;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-signout:hover { background: #444; color: #fff; }

  .upload-link {
    color: #60a5fa;
    text-decoration: none;
    font-size: 12px;
  }
  .upload-link:hover { text-decoration: underline; }

  .playlist-row {
    display: flex;
    gap: 8px;
    align-items: end;
  }
  .playlist-row .select-styled { flex: 1; }
</style>
</head>
<body>

<div id="overlay" class="overlay">
  <div id="overlayText" class="overlay-text"></div>
</div>

<div class="header">
  <h1>ClipCutter</h1>
  <div class="tabs">
    <div class="tab active" data-tab="process">Process</div>
    <div class="tab" data-tab="review">Review</div>
    <div class="tab" data-tab="export">Export</div>
  </div>
  <div class="header-right" id="headerRight"></div>
</div>

<div class="main">
  <div class="view active" id="view-process">
    <div class="form-section">
      <h2>Process Videos</h2>
      <div class="form-row">
        <div class="form-group wide">
          <label>Video folder</label>
          <input type="text" id="folderPath" placeholder="C:\path\to\videos" />
        </div>
        <div class="form-group">
          <label>Sensitivity</label>
          <input type="number" id="sensitivity" value="1.0" min="0.1" max="5.0" step="0.1" />
        </div>
        <div class="form-group">
          <label>Context (s)</label>
          <input type="number" id="context" placeholder="20" min="0" step="1" />
        </div>
        <button class="btn-scan" id="btnScan" onclick="window._cc.scanFolderHandler()">Scan</button>
        <button class="btn-process" id="btnProcess" onclick="window._cc.startProcessingHandler()">Process</button>
      </div>
    </div>
    <div id="folderScanPanel" style="display:none">
      <div class="scan-panel" id="videosInFolderSection"></div>
      <div class="scan-panel" id="staleCandidatesSection" style="border-color:#2d1111"></div>
    </div>
    <div class="log-box" id="logBox"></div>
  </div>

  <div class="view" id="view-review">
    <div id="reviewContent">
      <div class="empty-state">No pending clips. Process some videos first.</div>
    </div>
  </div>

  <div class="view" id="view-export">
    <div id="exportContent">
      <div class="empty-state">Loading export data...</div>
    </div>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
