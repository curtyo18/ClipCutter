<!DOCTYPE html>
<html lang="en" data-dir="B">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClipCutter</title>
</head>
<body>

<div class="cc">
  <div class="cc-titlebar">
    <span class="cc-app">ClipCutter</span>
    <span class="cc-app-meta">localhost:8000</span>
    <span style="flex:1"></span>
    <span class="cc-app-meta cc-dim" id="headerRight"></span>
    <span class="cc-dot" id="statusDot"></span>
  </div>

  <div class="cc-tabs">
    <button class="cc-tab" data-active="true" data-tab="process" type="button">
      <span class="cc-tab-num">01</span> Process
    </button>
    <button class="cc-tab" data-tab="review" type="button">
      <span class="cc-tab-num">02</span> Review
    </button>
    <button class="cc-tab" data-tab="export" type="button">
      <span class="cc-tab-num">03</span> Export
    </button>
    <span class="cc-tab-spacer"></span>
    <span class="cc-task-chip" data-state="idle" id="taskChip">
      <span class="cc-dot"></span><span>idle</span>
    </span>
  </div>

  <div class="cc-body">
    <div id="overlay" class="overlay">
      <div id="overlayText" class="overlay-text"></div>
    </div>
    <div class="cc-toast-wrap" id="toastWrap"></div>

    <div class="view active" id="view-process">
      <div class="cc-process">
        <div class="cc-process-head">
          <div class="cc-folder-bar">
            <span class="cc-dim" aria-hidden="true">📁</span>
            <input type="text" id="folderPath" placeholder="C:\path\to\videos"
                   style="background:transparent;border:0;color:var(--cc-fg);font-family:var(--cc-mono);font-size:var(--cc-fs-sm);outline:none;flex:1;min-width:0">
            <button class="cc-btn" data-variant="ghost" data-size="sm" id="btnScan" onclick="window._cc.scanFolderHandler()">Scan</button>
          </div>
          <div class="cc-stat-grid" id="folderStats" style="flex:0 0 380px;display:none">
            <div class="cc-stat"><div class="cc-stat-num" id="statUnprocessed">0</div><div class="cc-stat-lbl">unprocessed</div></div>
            <div class="cc-stat"><div class="cc-stat-num" id="statPending">0</div><div class="cc-stat-lbl">pending review</div></div>
            <div class="cc-stat"><div class="cc-stat-num" id="statProcessed">0</div><div class="cc-stat-lbl">processed</div></div>
          </div>
        </div>

        <div class="cc-process-main cc-panel">
          <div class="cc-panel-head">
            <span id="folderPanelTitle">Folder</span>
            <span class="cc-spacer" style="flex:1"></span>
            <button class="cc-btn" data-variant="ghost" data-size="sm" onclick="window._cc.scanFolderHandler()">↻ Rescan</button>
          </div>
          <div class="cc-panel-body" id="videosInFolderSection">
            <div style="padding:24px;text-align:center;color:var(--cc-fg-dim);font-size:var(--cc-fs-sm)">Pick a folder and click Scan.</div>
          </div>
          <div id="staleCandidatesSection" style="display:none"></div>
        </div>

        <div class="cc-process-side">
          <div class="cc-controls">
            <div class="cc-h">Detection</div>
            <div class="cc-control-row">
              <span class="cc-label">Sensitivity</span>
              <input type="range" class="cc-slider" id="sensitivity" min="0.1" max="5" step="0.1" value="1.0">
              <span class="cc-num" id="sensitivityVal">1.0</span>
            </div>
            <div class="cc-control-row">
              <span class="cc-label">Context</span>
              <input type="range" class="cc-slider" id="context" min="2" max="60" step="1" value="20">
              <span class="cc-num" id="contextVal">20s</span>
            </div>
            <div class="cc-control-row">
              <span class="cc-label">Stale after</span>
              <input type="range" class="cc-slider" id="staleThreshold" min="7" max="180" step="1" value="30">
              <span class="cc-num" id="staleThresholdVal">30d</span>
            </div>
            <button class="cc-btn" data-variant="primary" id="btnProcess"
                    style="height:calc(var(--cc-row-h) + 6px);margin-top:4px"
                    onclick="window._cc.startProcessingHandler()">▶ Process folder</button>
          </div>

          <div class="cc-panel" style="flex:1;min-height:0">
            <div class="cc-panel-head">
              <span>Last run</span>
              <span class="cc-spacer" style="flex:1"></span>
              <span class="cc-mono cc-dim" id="logElapsed" style="font-size:var(--cc-fs-xs);text-transform:none;letter-spacing:0"></span>
            </div>
            <div class="cc-panel-body" style="padding:var(--cc-pad)">
              <div class="cc-log" id="logBox"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="view" id="view-review">
      <div id="reviewContent">
        <div class="empty-state">No pending clips. Process some videos first.</div>
      </div>
    </div>

    <div class="view" id="view-export">
      <div class="cc-export">
        <div class="cc-storage" id="storageBar">
          <span class="cc-fg2" style="text-transform:uppercase;letter-spacing:0.1em;font-size:var(--cc-fs-xs)">Storage</span>
          <div class="cc-storage-bar" id="storageBarFill"></div>
          <div class="cc-storage-legend" id="storageBarLegend"></div>
        </div>
        <div class="cc-subtabs">
          <button class="cc-subtab" data-active="true" data-subtab="clips" type="button">
            Clips <span class="cc-subtab-count" id="clipsCount">0</span>
          </button>
          <button class="cc-subtab" data-subtab="compilation" type="button">
            Compilation <span class="cc-subtab-count" id="compCount">0</span>
          </button>
          <button class="cc-subtab" data-subtab="youtube" type="button">YouTube</button>
          <span style="flex:1"></span>
          <span class="cc-yt-status" id="ytSubtabStatus"></span>
        </div>
        <div class="cc-export-body" id="exportContent">
          <div class="empty-state">Loading export data...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
